name: AutoBOT-ETF-Momentum-Entry

on:
  schedule:
    # 10:00am ET (EDT = UTC-4) → 14:00 UTC, lunes a viernes
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt --quiet

      - name: Ejecutar momentum entry
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
        run: python etf_momentum_entry.py

      - name: Guardar estado del ETF ganador
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etf_state.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update etf_state [skip ci]"
          git push || true
