name: market-losers-dashboard

on:
  schedule:
    # 9:00am hora México (CDT = UTC-6) → 15:00 UTC, lunes a viernes
    - cron: "0 15 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar dashboard
        run: python market_losers_dashboard.py

      - name: Deploy a Firebase Hosting
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npm install -g firebase-tools --silent
          firebase deploy --only hosting --token "$FIREBASE_TOKEN" --site market-dashboard-gga --non-interactive
