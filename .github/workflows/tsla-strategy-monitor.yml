name: TSLA-Strategy-Monitor

on:
  schedule:
    # 2pm-8pm ET (EDT = UTC-4) → 18:00-00:00 UTC, lunes a viernes
    - cron: "0 18 * * 1-5"
    - cron: "0 19 * * 1-5"
    - cron: "0 20 * * 1-5"
    - cron: "0 21 * * 1-5"
    - cron: "0 22 * * 1-5"
    - cron: "0 23 * * 1-5"
    - cron: "0 0 * * 2-6"   # 8pm ET = medianoche UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt --quiet

      - name: Ejecutar check TSLA
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
        run: python tsla_check.py

      - name: Guardar estado TSLA
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tsla_state.json
          git diff --cached --quiet || git commit -m "chore: update tsla_state [skip ci]"
          git push
